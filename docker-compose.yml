services:

  postgres:
    build:
      context: ./infra/postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA:            ${PGDATA:-/var/lib/postgresql/data}
    command: >
      postgres
        -c shared_preload_libraries=pg_cron
        -c cron.database_name=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - postgres_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      N8N_BASIC_AUTH_ACTIVE:       ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER:         ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD:     ${N8N_BASIC_AUTH_PASSWORD}
      N8N_HOST:                    ${N8N_HOST}
      N8N_PORT:                    5678
      N8N_PROTOCOL:                https
      WEBHOOK_URL:                 ${WEBHOOK_URL}
      DB_TYPE:                     postgresdb
      DB_POSTGRESDB_HOST:          postgres
      DB_POSTGRESDB_PORT:          5432
      DB_POSTGRESDB_DATABASE:      ${DB_POSTGRESDB_DATABASE:-n8n_internal}
      DB_POSTGRESDB_USER:          ${DB_POSTGRESDB_USER}
      DB_POSTGRESDB_PASSWORD:      ${DB_POSTGRESDB_PASSWORD}
      N8N_ENCRYPTION_KEY:          ${N8N_ENCRYPTION_KEY}
      GHL_API_KEY:                 ${GHL_API_KEY}
      GHL_LOCATION_IDS:            ${GHL_LOCATION_IDS}
      WEBHOOK_SECRET:              ${WEBHOOK_SECRET}
      META_CLOUD_API_TOKEN:        ${META_CLOUD_API_TOKEN}
      META_VERIFY_TOKEN:           ${META_VERIFY_TOKEN}
      EXECUTIONS_DATA_SAVE_ON_ERROR: ${EXECUTIONS_DATA_SAVE_ON_ERROR:-all}
      EXECUTIONS_DATA_MAX_AGE:       ${EXECUTIONS_DATA_MAX_AGE:-168}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - default
      - easypanel
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.n8n-http.rule=Host(`${N8N_HOST}`)"
      - "traefik.http.routers.n8n-http.entrypoints=http"
      - "traefik.http.routers.n8n-http.middlewares=redirect-to-https@file,bad-gateway-error-page@file"
      - "traefik.http.routers.n8n-https.rule=Host(`${N8N_HOST}`)"
      - "traefik.http.routers.n8n-https.entrypoints=https"
      - "traefik.http.routers.n8n-https.tls=true"
      - "traefik.http.routers.n8n-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.n8n-https.middlewares=bad-gateway-error-page@file"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_TYPE:              postgres
      MB_DB_HOST:              postgres
      MB_DB_PORT:              5432
      MB_DB_DBNAME:            ${MB_DB_DBNAME:-metabase_app}
      MB_DB_USER:              ${MB_DB_USER}
      MB_DB_PASS:              ${MB_DB_PASS}
      MB_SITE_URL:             ${MB_SITE_URL}
      MB_EMBEDDING_SECRET_KEY: ${MB_EMBEDDING_SECRET_KEY}
      JAVA_TIMEZONE:           America/Bogota
      MB_SEND_EMAIL_ON_FIRST_LOGIN: ${MB_SEND_EMAIL_ON_FIRST_LOGIN:-false}
    volumes:
      - metabase_data:/metabase-data
    networks:
      - default
      - easypanel
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.metabase-http.rule=Host(`${MB_DOMAIN}`)"
      - "traefik.http.routers.metabase-http.entrypoints=http"
      - "traefik.http.routers.metabase-http.middlewares=redirect-to-https@file,bad-gateway-error-page@file"
      - "traefik.http.routers.metabase-https.rule=Host(`${MB_DOMAIN}`)"
      - "traefik.http.routers.metabase-https.entrypoints=https"
      - "traefik.http.routers.metabase-https.tls=true"
      - "traefik.http.routers.metabase-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.metabase-https.middlewares=bad-gateway-error-page@file"
      - "traefik.http.services.metabase.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 120s

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    restart: unless-stopped
    volumes:
      - kuma_data:/app/data
    networks:
      - default
      - easypanel
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.kuma-http.rule=Host(`${KUMA_DOMAIN}`)"
      - "traefik.http.routers.kuma-http.entrypoints=http"
      - "traefik.http.routers.kuma-http.middlewares=redirect-to-https@file,bad-gateway-error-page@file"
      - "traefik.http.routers.kuma-https.rule=Host(`${KUMA_DOMAIN}`)"
      - "traefik.http.routers.kuma-https.entrypoints=https"
      - "traefik.http.routers.kuma-https.tls=true"
      - "traefik.http.routers.kuma-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.kuma-https.middlewares=bad-gateway-error-page@file"
      - "traefik.http.services.kuma.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get({hostname:'localhost',port:3001,path:'/'},(r)=>{process.exit(r.statusCode<400?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST:           postgres
      POSTGRES_PORT:           5432
      POSTGRES_DB:             ${POSTGRES_DB}
      POSTGRES_USER:           ${POSTGRES_USER}
      POSTGRES_PASSWORD:       ${POSTGRES_PASSWORD}
      METABASE_SITE_URL:       ${MB_SITE_URL}
      MB_EMBEDDING_SECRET_KEY: ${MB_EMBEDDING_SECRET_KEY}
      PORTAL_ADMIN_USER:       ${PORTAL_ADMIN_USER}
      PORTAL_ADMIN_PASSWORD:   ${PORTAL_ADMIN_PASSWORD}
      NEXT_PUBLIC_PORTAL_URL:  https://${PORTAL_DOMAIN}
      NODE_ENV:                production
    volumes:
      - portal_data:/app/.next/cache
    networks:
      - default
      - easypanel
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.portal-http.rule=Host(`${PORTAL_DOMAIN}`)"
      - "traefik.http.routers.portal-http.entrypoints=http"
      - "traefik.http.routers.portal-http.middlewares=redirect-to-https@file,bad-gateway-error-page@file"
      - "traefik.http.routers.portal-https.rule=Host(`${PORTAL_DOMAIN}`)"
      - "traefik.http.routers.portal-https.entrypoints=https"
      - "traefik.http.routers.portal-https.tls=true"
      - "traefik.http.routers.portal-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.portal-https.middlewares=bad-gateway-error-page@file"
      - "traefik.http.services.portal.loadbalancer.server.port=4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
    driver: local
  postgres_backups:
    driver: local
  n8n_data:
    driver: local
  metabase_data:
    driver: local
  kuma_data:
    driver: local
  portal_data:
    driver: local

networks:
  default:
    driver: bridge
  easypanel:
    external: true
