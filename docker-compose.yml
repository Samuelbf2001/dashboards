# ─────────────────────────────────────────────────────────────────────────────
# GHL Analytics Platform — Docker Compose (modo EasyPanel)
#
# EasyPanel provee su propio Traefik en los puertos 80/443 y rutea los
# servicios mediante labels que inyecta a través de su docker-compose.override.yml.
# Por eso este compose NO incluye Traefik ni labels de routing — los dominios
# se configuran desde la UI de EasyPanel (Service → Domains).
#
# Secretos: nunca hardcodear. Usar EasyPanel Secret Manager para variables [SECRET].
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── POSTGRESQL 16 + pgvector + pg_cron ────────────────────────────────────
  # Se buildea desde infra/postgres/Dockerfile para asegurar que tanto pgvector
  # como pg_cron estén disponibles (las imágenes oficiales solo traen uno de
  # los dos, o ninguno).
  postgres:
    build:
      context: ./infra/postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA:            ${PGDATA:-/var/lib/postgresql/data}
    # pg_cron requiere estar listado en shared_preload_libraries
    command: >
      postgres
        -c shared_preload_libraries=pg_cron
        -c cron.database_name=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Scripts SQL se ejecutan en orden alfabético al primer arranque
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - postgres_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── N8N ── Orquestador ETL + receptor de webhooks ─────────────────────────
  # Dominio: configurar en EasyPanel → n8n → Domains → Port 5678
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      N8N_BASIC_AUTH_ACTIVE:       ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER:         ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD:     ${N8N_BASIC_AUTH_PASSWORD}
      N8N_HOST:                    ${N8N_HOST}
      N8N_PORT:                    5678
      N8N_PROTOCOL:                https
      WEBHOOK_URL:                 ${WEBHOOK_URL}
      DB_TYPE:                     postgresdb
      DB_POSTGRESDB_HOST:          postgres
      DB_POSTGRESDB_PORT:          5432
      DB_POSTGRESDB_DATABASE:      ${DB_POSTGRESDB_DATABASE:-n8n_internal}
      DB_POSTGRESDB_USER:          ${DB_POSTGRESDB_USER}
      DB_POSTGRESDB_PASSWORD:      ${DB_POSTGRESDB_PASSWORD}
      N8N_ENCRYPTION_KEY:          ${N8N_ENCRYPTION_KEY}
      GHL_API_KEY:                 ${GHL_API_KEY}
      GHL_LOCATION_IDS:            ${GHL_LOCATION_IDS}
      WEBHOOK_SECRET:              ${WEBHOOK_SECRET}
      META_CLOUD_API_TOKEN:        ${META_CLOUD_API_TOKEN}
      META_VERIFY_TOKEN:           ${META_VERIFY_TOKEN}
      EXECUTIONS_DATA_SAVE_ON_ERROR: ${EXECUTIONS_DATA_SAVE_ON_ERROR:-all}
      EXECUTIONS_DATA_MAX_AGE:       ${EXECUTIONS_DATA_MAX_AGE:-168}
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── METABASE ── Dashboards BI con RLS por cliente ──────────────────────────
  # Dominio: configurar en EasyPanel → metabase → Domains → Port 3000
  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_TYPE:              postgres
      MB_DB_HOST:              postgres
      MB_DB_PORT:              5432
      MB_DB_DBNAME:            ${MB_DB_DBNAME:-metabase_app}
      MB_DB_USER:              ${MB_DB_USER}
      MB_DB_PASS:              ${MB_DB_PASS}
      MB_SITE_URL:             ${MB_SITE_URL}
      MB_EMBEDDING_SECRET_KEY: ${MB_EMBEDDING_SECRET_KEY}
      JAVA_TIMEZONE:           America/Bogota
      MB_SEND_EMAIL_ON_FIRST_LOGIN: ${MB_SEND_EMAIL_ON_FIRST_LOGIN:-false}
    volumes:
      - metabase_data:/metabase-data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 120s

  # ─── UPTIME KUMA ── Monitoreo de salud de todos los servicios ───────────────
  # Dominio: configurar en EasyPanel → uptime-kuma → Domains → Port 3001
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    restart: unless-stopped
    volumes:
      - kuma_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001', r => process.exit(r.statusCode===200?0:1))\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# ─── VOLÚMENES PERSISTENTES ──────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  postgres_backups:
    driver: local
  n8n_data:
    driver: local
  metabase_data:
    driver: local
  kuma_data:
    driver: local

# ─── RED INTERNA ─────────────────────────────────────────────────────────────
# EasyPanel adjunta los servicios a su red (normalmente "easypanel_default")
# para que el Traefik nativo pueda enrutarlos. Los servicios se ven entre sí
# por nombre (postgres, n8n, metabase, uptime-kuma).
